databases:
  - name: wb-analytics-db
    plan: free
    databaseName: wb_analytics
    user: wb

services:
  - type: web
    name: wb-analytics-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wb-analytics-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
